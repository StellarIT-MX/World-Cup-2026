name: Security scan

on:
  schedule:
    - cron: '0 6,18 * * *'   # 06:00 y 18:00 UTC — dos veces al día
  workflow_dispatch:

permissions:
  contents: read

jobs:
  osv-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # osv-scanner instalado como binario fijado y verificado por checksum, en vez
      # de la action wrapper — una dependencia menos que auditar. Para actualizar:
      # subir versión y pegar el sha de osv-scanner_SHA256SUMS de esa release.
      OSV_VERSION: v2.4.0
      OSV_SHA256: 15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Instalar osv-scanner (binario fijado + checksum)
        run: |
          url="https://github.com/google/osv-scanner/releases/download/${OSV_VERSION}/osv-scanner_linux_amd64"
          curl -fsSL "$url" -o osv-scanner
          echo "${OSV_SHA256}  osv-scanner" | sha256sum -c -
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/osv-scanner

      # Recorre el repo: pnpm-lock.yaml (node), workflows de .github (actions,
      # incluidas las fijadas por SHA — el punto ciego de Dependabot) y cualquier
      # otro lockfile que aparezca (composer.lock, etc.). Sale != 0 si hay CVEs,
      # con lo que el job falla y GitHub te notifica.
      - name: Escanear dependencias contra OSV
        run: osv-scanner scan -r --verbosity info ./
