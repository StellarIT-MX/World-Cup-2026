name: Update match results

on:
  schedule:
    - cron: '0,20,40 16-23 * * *'  # cada 20 min, 10:00–17:40 GMT-6 (mañana/tarde)
    - cron: '0,20,40 0-5 * * *'   # cada 20 min, 18:00–23:40 GMT-6 (noche, cubre hasta ~11:40 PM)
  workflow_dispatch:               # disparo manual desde la pestaña Actions en GitHub

jobs:
  update-results:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm data

      - name: Commit si hubo cambios
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/results.json
          if git diff --cached --quiet; then
            echo "Sin cambios en results.json — se omite el commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update match results [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Siempre sube el archivo — así un fallo de FTP previo no deja producción desactualizada.
      - name: Upload results.json a Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/data/
          server-dir: ${{ vars.FTP_SERVER_DIR }}/
          exclude: teams.json|fixtures.json|stadiums.json|annexe-c.json
