name: Update match results

on:
  schedule:
    - cron: '0,20,40 16-23 * * *'  # cada 20 min, 10:00–17:40 GMT-6 (mañana/tarde)
    - cron: '0,20,40 0-5 * * *'   # cada 20 min, 18:00–23:40 GMT-6 (noche, cubre hasta ~11:40 PM)
  workflow_dispatch:               # disparo manual desde la pestaña Actions en GitHub

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GH_PAT }}

      # Harden manual del runner (sin actions de terceros): registra toda conexión
      # saliente nueva a partir de aquí — captura el egress de las actions y scripts
      # que corren con los secrets en memoria. Es solo LOG: nunca bloquea el build.
      - name: Armar auditoría de egress
        run: sudo .github/scripts/egress-guard.sh arm-audit

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm data

      - name: Commit si hubo cambios
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/results.json
          if git diff --cached --quiet; then
            echo "Sin cambios en results.json — se omite el commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update match results [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Siempre sube el archivo — así un fallo de FTP previo no deja producción desactualizada.
      - name: Upload results.json a Hostinger
        uses: SamKirkland/FTP-Deploy-Action@110f9186c050f71550953127052e77650219c287 # v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./public/data/
          server-dir: ${{ vars.FTP_SERVER_DIR }}/
          exclude: teams.json|fixtures.json|stadiums.json|annexe-c.json

      # Vuelca los destinos salientes observados durante el job. Corre siempre
      # (incluso si algo falló) para no perder la evidencia. Solo informa.
      - name: Reporte de egress
        if: always()
        run: sudo .github/scripts/egress-guard.sh report
